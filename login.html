<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NihongoZen - ログイン</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet"/>

<style>
body {
  margin:0;
  font-family:'Noto Sans JP',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#f0f0f0,#ffffff);
}

.login-box {
  background:#fff;
  padding:40px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  text-align:center;
  width:90%;
  max-width:400px;
}

.btn-google {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:14px;
  border-radius:8px;
  border:2px solid #4285F4;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="login-box">
  <h2>ログイン / Sign In</h2>
  <button id="googleLogin" class="btn-google">
    Googleでログイン
  </button>
  <div id="user-info"></div>
</div>

<!-- Firebase v9 (MODULAR) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  // your config
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();

document.getElementById('googleLogin').onclick = async () => {
  const provider = new GoogleAuthProvider();
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    document.getElementById('user-info').innerHTML = `
      <p>ようこそ、${user.displayName}</p>
      <img src="${user.photoURL}" width="80" style="border-radius:50%">
    `;
  } catch (e) {
    alert(e.message);
  }
};
</script>

</body>
</html>
