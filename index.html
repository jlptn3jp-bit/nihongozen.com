<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NihongoZen Login</title>

<script type="module" src="js/auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ffd6e0, #d6d6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

.header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
  background: white;
  position: fixed;
  top: 0;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  width: 300px;
  margin-top: 80px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

button {
  padding: 10px 20px;
  border: none;
  background: #ff8fab;
  color: white;
  cursor: pointer;
  margin: 5px;
}
</style>
</head>

<body>

<!-- HEADER (ab sahi jagah) -->
<header class="header">
  <div class="logo-box">
    <img src="assets/logo.png" width="40">
    <span>Nihongo Zen</span>
  </div>

  <nav>
    <a class="active">Home</a>
    <a>Courses</a>
    <a>Practice</a>
  </nav>
</header>

<!-- LOGIN CARD -->
<div class="card">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button id="login-btn">Login</button>
  <button id="signup-btn">Sign Up</button>
</div>

</body>
</html>
