<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Japanese Vocabulary App</title>
<!-- Optional: Google Fonts for Japanese style -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet" />
<style>
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    background-color: #F5F0E8;
    /* Add a vibrant background pattern or image */
    background-image: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%), 
                      url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
    background-size: cover, contain;
    background-repeat: no-repeat, repeat;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    background: rgba(255, 255, 255, 0.9);
    padding: 40px 20px;
    border-radius: 12px;
    max-width: 600px;
    width: 90%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    text-align: center;
  }

  h1 {
    font-size: 2em;
    margin-bottom: 0.5em;
    color: #1A1A2E;
  }

  p {
    font-size: 1.2em;
    color: #333;
  }

  /* Button styles */
  a.button {
    display: inline-block;
    margin-top: 20px;
    padding: 14px 24px;
    background-color: #E8B86D;
    color: #1A1A2E;
    font-weight: 600;
    border-radius: 20px;
    text-decoration: none;
    font-size: 1em;
    transition: background-color 0.3s;
  }

  a.button:hover {
    background-color: #d4a057;
  }
</style>
</head>
<body>

<div class="container">
  <h1>ようこそ！</h1>
  <p>日本語の語彙学習へようこそ。このアプリで勉強を始めましょう！</p>
  <a href="app.html" class="button">スタート</a>
</div>

</body>
</html>
