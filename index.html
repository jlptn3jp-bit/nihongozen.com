```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Japanese Vocabulary App</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet" />

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
}

/* Container */
.container {
  max-width: 800px;
  margin: 40px auto;
  background: rgba(255,255,255,0.95);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

/* Nav */
nav ul {
  list-style: none;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

nav a {
  text-decoration: none;
  background: #E8B86D;
  padding: 8px 14px;
  border-radius: 15px;
  color: #000;
}

/* Buttons */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #E8B86D;
  border-radius: 20px;
  cursor: pointer;
}

/* Content */
#content {
  margin-top: 20px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login-section">
    <h1>ようこそ！</h1>
    <p>ログインして始めましょう</p>
    <button onclick="loginWithGmail()">Login with Gmail</button>
  </div>

  <!-- MAIN -->
  <div id="main-section" style="display:none;">

    <h1>日本語学習アプリ</h1>
    <p id="user-info"></p>

    <!-- NAVIGATION -->
    <nav>
      <ul>
        <li><a href="#" onclick="loadContent('n5')">N5</a></li>
        <li><a href="#" onclick="loadContent('n4')">N4</a></li>
        <li><a href="#" onclick="loadContent('n3')">N3</a></li>
        <li><a href="#" onclick="loadContent('n2')">N2</a></li>
        <li><a href="#" onclick="loadContent('n1')">N1</a></li>
        <li><a href="#" onclick="loadContent('kanji')">Kanji</a></li>
        <li><a href="#" onclick="loadContent('contact')">Contact</a></li>
      </ul>
    </nav>

    <!-- CONTENT AREA -->
    <section id="content">
      <p>Select a level to start learning 📚</p>
    </section>

    <button onclick="logout()">Logout</button>

  </div>

</div>

<script>
// 🔥 REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// LOGIN
function loginWithGmail() {
  auth.signInWithPopup(provider);
}

// LOGOUT
function logout() {
  auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('main-section').style.display = 'block';
    document.getElementById('user-info').innerText = "Welcome, " + user.displayName;
  } else {
    document.getElementById('login-section').style.display = 'block';
    document.getElementById('main-section').style.display = 'none';
  }
});

// 📚 DYNAMIC CONTENT
function loadContent(section) {
  const content = document.getElementById("content");

  const data = {
    n5: "N5 Vocabulary: こんにちは (Hello), ありがとう (Thank you)",
    n4: "N4 Vocabulary: 必要 (Necessary), 経験 (Experience)",
    n3: "N3 Vocabulary: 状況 (Situation), 提案 (Suggestion)",
    n2: "N2 Vocabulary: 改善 (Improvement), 判断 (Judgment)",
    n1: "N1 Vocabulary: 概念 (Concept), 本質 (Essence)",
    kanji: "Kanji Practice: 日 (Sun), 月 (Moon), 火 (Fire)",
    contact: "Contact us at: support@example.com"
  };

  content.innerHTML = "<p>" + data[section] + "</p>";
}
</script>

</body>
</html>
```
