<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NihongoZen Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

<!-- SCRIPTS -->
<script type="module" src="js/protect.js"></script>
<script type="module" src="js/dashboard.js"></script>

<style>
body {
  font-family: Arial;
  background: #fff5f7;
  margin: 0;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: white;
}

.logo-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-box img {
  width: 40px;
}

nav button {
  margin: 5px;
  padding: 8px 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 6px;
}

main {
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <div class="logo-box">
    <img src="assets/logo.png" alt="logo">
    <span>NihongoZen</span>
  </div>

  <button id="logoutBtn">Logout</button>
</header>

<nav>
  <button data-level="n5">N5</button>
  <button data-level="n4">N4</button>
  <button data-level="n3">N3</button>
  <button data-level="n2">N2</button>
  <button data-level="n1">N1</button>
</nav>

<main>
  <h2 id="userEmail">Loading...</h2>

  <div id="content">
    <h3>Select a level to start</h3>
  </div>
</main>

</body>
</html>
